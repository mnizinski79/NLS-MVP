<div *ngIf="visible" class="landing-container" [class.landing-exit]="!visible" role="main" aria-label="Hotel search landing page">
  <!-- Desktop: Split view with globe on right -->
  <div class="landing-desktop">
    <!-- Left side: Chat Panel (matching desktop-layout) -->
    <div class="landing-left">
      <div class="floating-chat-panel">
        <!-- IHG Banner -->
        <div class="ihg-banner">
          <img src="assets/IHG.svg" alt="IHG Hotels & Resorts" class="ihg-banner-logo" />
          <span class="ihg-banner-feedback">Feedback?</span>
        </div>

        <!-- Header -->
        <div class="header">
        </div>

        <!-- Chat content area -->
        <div class="chat-container">
          <!-- Welcome content when no messages -->
          <div class="welcome-content">
            <div class="brand-section">
              <div class="brand-icon">
                <img src="assets/Sparkles.svg" alt="IHG AI Assistant" class="brand-logo">
              </div>
              <p class="brand-tagline">6,900+ hotels across 100+ countries.<br>Wherever the world takes you, we're already there.</p>
              <h2 class="brand-headline">So, where to?</h2>
            </div>
          </div>
        </div>

        <!-- Examples + Input at bottom -->
        <div class="input-container">
          <div class="examples-section">
            <p class="examples-label">Popular searches</p>
            <div class="examples-grid">
              <button
                *ngFor="let query of exampleQueries"
                class="example-chip"
                (click)="onFirstMessage(query)"
                [attr.aria-label]="'Try example query: ' + query"
              >
                {{ query }}
              </button>
            </div>
          </div>
          <app-input
            [placeholder]="'Ask me about hotels in NYC...'"
            (messageSent)="onFirstMessage($event)"
          ></app-input>
        </div>
      </div>
    </div>
    
    <!-- Right side: Globe -->
    <div class="landing-right">
      <div class="globe-container">
        <om-three-globe
          [globeSize]="'700px'"
          [globeConfig]="globeConfig"
          [arcs]="globeArcs"
          [arcAndRingColors]="['#1F4456']"
        ></om-three-globe>
      </div>
    </div>
  </div>
  
  <!-- Mobile: Fixed input at bottom -->
  <div class="landing-mobile">
    <!-- IHG Banner -->
    <div class="ihg-banner">
      <img src="assets/IHG.svg" alt="IHG Hotels & Resorts" class="ihg-banner-logo" />
      <span class="ihg-banner-feedback">Feedback?</span>
    </div>

    <div class="mobile-content">
      <div class="brand-section">
        <div class="brand-icon">
          <img src="assets/Sparkles.svg" alt="IHG AI Assistant" class="brand-logo">
        </div>
        <p class="brand-tagline">6,900+ hotels across 100+ countries.<br>Wherever the world takes you, we're already there.</p>
        <h2 class="brand-headline">So, where to?</h2>
      </div>
    </div>
    
    <!-- Fixed input at bottom (like chat) -->
    <div class="mobile-input-container">
      <div class="examples-section">
        <p class="examples-label">Popular searches</p>
        <div class="examples-grid">
          <button
            *ngFor="let query of exampleQueries"
            class="example-chip"
            (click)="onFirstMessage(query)"
            [attr.aria-label]="'Try example query: ' + query"
          >
            {{ query }}
          </button>
        </div>
      </div>
      <app-input
        [placeholder]="'Ask me about hotels in NYC...'"
        (messageSent)="onFirstMessage($event)"
      ></app-input>
    </div>
  </div>
</div>
