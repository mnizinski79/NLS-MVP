<div *ngIf="visible" class="landing-container" [class.landing-exit]="!visible" role="main" aria-label="Hotel search landing page">

  <!-- Desktop: Centered layout with globe background -->
  <div class="landing-desktop">
    <!-- Centered chat panel -->
    <div class="landing-center">
      <div class="floating-chat-panel">
        <!-- IHG Banner -->
        <div class="ihg-banner">
          <img src="assets/IHG.svg" alt="IHG Hotels & Resorts" class="ihg-banner-logo" />
          <button class="join-signin-btn">
            <img src="assets/Loyalty.svg" alt="" class="loyalty-icon" />
            Join / Sign in
          </button>
        </div>

        <!-- Brand content -->
        <div class="chat-container">
          <div class="welcome-content">
            <div class="brand-section">
              <div class="brand-icon">
                <img src="assets/Sparkles.svg" alt="IHG AI Assistant" class="brand-logo">
              </div>
              <p class="brand-subtitle">Where to?</p>
              <p class="brand-tagline">6,900+ hotels across 100+ countries.<br>Wherever the world takes you, we're already there.</p>
            </div>

            <!-- Scrolling card ticker -->
            <div class="card-ticker-wrapper">
              <div class="card-ticker" #tickerTrack>
                <div *ngFor="let src of tickerCards; let i = index" class="ticker-card-wrap">
                  <img [src]="src" alt="IHG Property" class="ticker-card" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Input at bottom -->
        <div class="input-container">
          <app-input
            [placeholder]="'Where do you want to go...'"
            (messageSent)="onFirstMessage($event)"
          ></app-input>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile: Fixed input at bottom -->
  <div class="landing-mobile">
    <!-- IHG Banner -->
    <div class="ihg-banner">
      <img src="assets/IHG.svg" alt="IHG Hotels & Resorts" class="ihg-banner-logo" />
      <button class="join-signin-btn">
        <img src="assets/Loyalty.svg" alt="" class="loyalty-icon" />
        Join / Sign in
      </button>
    </div>

    <div class="mobile-content">
      <div class="brand-section">
        <div class="brand-icon">
          <img src="assets/Sparkles.svg" alt="IHG AI Assistant" class="brand-logo">
        </div>
        <p class="brand-subtitle">Where to?</p>
        <p class="brand-tagline">6,900+ hotels across 100+ countries.<br>Wherever the world takes you, we're already there.</p>
      </div>

      <!-- Scrolling card ticker on mobile too -->
      <div class="card-ticker-wrapper">
        <div class="card-ticker" #tickerTrackMobile>
          <div *ngFor="let src of tickerCards; let i = index" class="ticker-card-wrap">
            <img [src]="src" alt="IHG Property" class="ticker-card" />
          </div>
        </div>
      </div>
    </div>

    <!-- Fixed input at bottom -->
    <div class="mobile-input-container">
      <app-input
        [placeholder]="'Where do you want to go...'"
        (messageSent)="onFirstMessage($event)"
      ></app-input>
    </div>
  </div>
</div>
